name: GitHub 3D Profile

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-profile
    steps:
      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: kirigaya07
          MAX_REPOS: 10

      - name: Commit & Push
        run: |
          git config user.name "kirigya07"
          git config user.email "crimsomemoon7@gmail.com"
          git add -A .
          git diff --cached --exit-code || git commit -m "Update 3D contribution profile"
          git push
